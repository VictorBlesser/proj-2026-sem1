<!DOCTYPE html>
<html>
  <head>
    <meta name="author" content="Grupo I9" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="language" content="pt-br" />
    <meta name="description" content="Implementação do Sistema" />
    <meta name="robots" content="index,nofollow" />
    <title>Sistema de Automação para Indústrias de Papel</title>
    <script src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.5.5.nomodule.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/css">
     html {
         font-family: 'Roboto', sans-serif;
         font-size: 10px;
     }
     
     body {
         margin: 0;
         padding: 0;
         height: 100vh;
     }

     label {
         margin: 0 4px 5px 4px;
     }

     h4 {
         font-size: 2.4rem;
     }

     input::placeholder {
         font-style: italic;
         font-weight: 500;
         color: #6c757d;
     }

     input, label, textarea {
         font-size: 1.2rem;
     }

     .txt-black {
         color: #0f172a;
     }

     .txt-gray {
         color: #6c757d;
     }

     .bdr-black {
         border-color: #0f172a;
     }

     .bg-accent {
         background-color: #4da3ff !important;
     }

     .bg-danger {
         background-color: #ff8c42 !important;
     }

     .bg-success {
         background-color: #2ec4b6 !important;
     }

     .txt-success {
         color: #1f867c;
     }

     .bg-info {
         background-color: #6f42c1 !important;
     }

     .txt-info {
         color: #6f42c1;
     }

     .bg-warning {
         background-color: #ffc107 !important;
     }

     .txt-warning {
         color: #ffc107;
     }

     .bg-error {
         background-color: #ff8c42 !important;
     }

     .txt-error {
         color: #ff8c42;
     }

     .btn-inicial:focus-visible, .btn-inicial:hover, .btn-inicial:active {
         background-color: #4da3ff;
         border-color: #4da3ff;
         box-shadow: none;
     }

     .btn:focus-visible, .btn:hover, .btn:active, .btn.active, .btn.show {
         background-color: transparent;
         border-color: transparent;
         outline: none;
         box-shadow: none;
     }

     .btn-inicial {
         width: 30rem;
         height: 13.5rem;
         font-size: 3.6rem;
     }

     .btn-pedido {
         width: 9.6rem;
         height: 4.8rem;
         font-size: 2.4rem;
     }

     .form-select {
         font-size: 1.6rem;
         height: 2.7rem;
         outline: none;
     }
     
     .form-control:focus, .form-select:focus, .form-select:hover, .form-select:active {
         background-color: transparent !important;
         border-color: inherit;
         outline: none !important;
         box-shadow: none !important;
     }

     .form-group {
         margin-bottom: 5rem;
     }

     .p-2-4 {
         padding: 2px 4px;
     }

     .popup {
         top: 10rem;
         left: 0;
         right: 0;
         width: 27rem;
         height: fit-content;
         font-size: 1.6rem;
         margin: 0 auto;
         background-color: #e9eaec;
         overflow: hidden;
         z-index: 9999;
     }
    </style>
  </head>
  <body>
    <script type="text/javascript" src="interfaces.js"></script>
    <script type="text/javascript" src="ISO_A.js"></script>
    <script type="text/javascript" src="ISO_B.js"></script>
    <script type="text/javascript" src="ISO_C.js"></script>
    <script type="text/javascript" src="program.js"></script>
    <script type="text/javascript">
     const fabrica = new iFactory();
     
     const TipoA = fabrica.criarPapel("A0");

     const { div, h1, h4, button, img, form, label, select, input, datalist, option, p } = van.tags;

     const closed = van.state(false);

     let telaPedidoRef, telaCustom, pedido, popupRef, popupTimeout;
     
     const tipoSelecionado = van.state('A0');
     const quantidade = van.state('');
     const gramatura = van.state('75g');
     const cor = van.state("#6c757d");

     const opcoes = TipoA.tipos;
     const sugestoesGramatura = [70, 75, 80, 85, 90, 95, 100, 105];

     const logo = () => div({ class: "navbar-brand", style: "margin-top: 6.2rem; margin-left: 9.6rem; width: 12.8rem; height: 12.8rem;" }, img({ src: "../img/logo.png", alt: "Logo da Blue Paperworks", height: 128 }));

     const botaoVoltar = ref => {
       if (ref == "TelaPedidos") {
         ref = () => telaPedidoRef.remove();
       }
       else if (ref == "TelaCustom") {
         ref = () => telaCustomRef.remove();
       }
       
       if (ref != '') return () => button({ class: "btn txt-black m-0 p-0", style: "font-weight: bold; font-size: 2.4rem;", onclick: ref }, "< Voltar")
     }
     
     const header = (titulo, el = '') => div({ class: "position-fixed top-0 start-0 m-0 p-0 d-flex justify-content-between", style: "width: calc(50% + 7.2rem); height: calc(20rem + 7.2rem);" },
       logo(),
       botaoVoltar(el),
       h1({ class: "p-0", style: "margin-top: 20rem; font-size: 7.2rem;" }, titulo)
     );

     const popupNotif = (info, type = 'success') => {
       let headingIcon, hintColor;

       if (popupRef) {
         popupRef.remove();
         clearTimeout(popupTimeout);
       }
       
       if (type == 'success') {
         headingIcon = "Pedido Enviado";
         hintColor = "bg-success"
         textColor = "txt-success"
       }
       else if (type == 'aviso') {
         headingIcon = "Aviso:";
         hintColor = "bg-warning";
         textColor = "txt-warning";
       }
       else if (type == 'erro') {
         headingIcon = "Erro: Algo deu errado";
         hintColor = "bg-error";
         textColor = "txt-error";
       }
       else {
         headingIcon = "i";
         hintColor = "bg-info";
         textColor = "txt-info";
       }
       
       popupRef = div({ class: "position-fixed p-0 alert fade show popup bdr-black", role: "alert"},
         div({ class: `w-100 ${hintColor}`, style: "height: 4px;" }),
                      h4({ class: `alert-heading ${textColor}`, style: "padding-top: 8px; padding-left: 4px; padding-bottom: 1px;" }, headingIcon),
         p({ style: "padding-left: 4px;" }, info)
       )

       van.add(document.body, popupRef);
       popupTimeout = setTimeout(() => { popupRef.remove(); }, 10000);
     }

     const registrar = mensagem => console.log(`[${Date.now()}]: ${mensagem}`);
     
     const enviarParada = () => {
       popupNotif("Parando a produção", "aviso");
       registrar('API POST / { "cmd": [ { "op": "STOP" } ] }');
     }

     let infoString
     const enviarPedido = infoCmd => {
       infoString = JSON.parse(infoCmd.slice(11)).cmd[0];
       
       popupNotif(`Enviando Pedido: ${infoString.quantidade} un. de ${infoString.tipo} com ${infoString.gramatura} gsm e cor ${infoString.cor}`);
       registrar(infoCmd)
     }

     const validar = expression => {
       if (expression) {
         return true
       }
       else {
         popupNotif("Algum campo está com informação inválida, em caso de dúvidas consulte o manual.", "aviso");
         registrar("Erro: Alguma das variáveis está com valor incorreto");
       }
     }

     const validarPedido = (e) => {
       let quantidadeInt, gramaturaInt;
       e.preventDefault();

       if (validar(quantidade.val.length < 7 && /^\d+$/.test(quantidade.val))) {
         quantidadeInt = parseInt(quantidade.val);

         if (validar(gramatura.val.length < 5)) {

           gramaturaInt = gramatura.val
           
           if (/g$/i.test(gramaturaInt)) {
             gramaturaInt = gramaturaInt.slice(0, -1);
           }
           
           if (validar(!/[a-zA-Z]$/.test(gramaturaInt))) {
             gramaturaInt = parseInt(gramaturaInt);

             if (validar(/^[a-zA-Z0-9_]+$/.test(tipoSelecionado.val) && quantidadeInt > 0 && quantidadeInt <= 100000 && gramaturaInt > 0 && gramaturaInt < 1000 && /^#[a-f0-9]+$/.test(cor.val))) {
               pedido = fabrica.criarPapel(tipoSelecionado.val);
               
               enviarPedido(`API POST / { "cmd": [ { "tipo": "${tipoSelecionado.val}", "formato": "${pedido.mostrarTamanhoFolha()}", "gramatura": "${gramaturaInt}", "quantidade": "${quantidadeInt}", "cor": "${cor.val}" } ] }`)
             }
           }
         }
       }
     }

     const TelaPedidos = div({ class: "position-fixed top-0 start-0 m-0 p-0 w-100 h-100", style: "background-color: white; z-index: 1000;" },
       header("Pedidos", "TelaPedidos"),
       form({ onsubmit: validarPedido, class: "position-absolute", style: "top: calc(20rem + 7.2rem + 10rem); margin-left: calc(50% - 27rem + 7rem); width: 27rem;" },
         div({ class: "form-group" },
           label({ class: "form-group-text bg-transparent border-0 p-0", for: "combobox-tipo" }, "Tipo:"),
           select({ id: "combobox-tipo", class: "form-select border-black text-center txt-black bdr-black rounded-0 p-2-4 lh-1", style: "width: 6rem;", oninput: e => tipoSelecionado.val = e.target.value },
             opcoes.map(opt => option({ value: opt }, opt))
           ),
         ),
         div({ class: "form-group" },
             label({ class: "form-group-text bg-transparent border-0 p-0", for: "input-quantidade" }, "Quantidade:"),
             input({ id: "input-quantidade", required: true, class: "form-control txt-black bdr-black rounded-0 p-2-4", placeholder: "Um número de 1-1000...", type: "numeric", onkeydown: e => { if (e.key == 'Enter') e.preventDefault(); }, onchange: e => quantidade.val = e.target.value })
         ),
         div({ class: "form-group" },
             label({ class: "form-group-text bg-transparent border-0 p-0", for: "combobox-ed-gramatura" }, "Gramatura:"),
             input({ id: "combobox-ed-gramatura", class: "form-control form-select txt-black bdr-black rounded-0 p-2-4 lh-1", style: "width: 7.2rem; height: 2.7rem;", type: "numeric", list: "padroes-comuns-gsm", maxlength: 4, value: () => gramatura.val, onkeydown: e => { if (e.key == 'Enter') e.preventDefault(); }, onchange: e => gramatura.val = e.target.value }),
             datalist({ id: "padroes-comuns-gsm" },
               sugestoesGramatura.map(opt => option({ value: opt}))
             )
         ),
         div ({ class: "form-group" },
              label({ class: "form-group-text bg-transparent border-0 p-0", for: "seletor-cor" }, "Cor de impressão:"),
              input({ id: "seletor-cor", class: "form-control bdr-black", style: "width: 5.2rem; height: 5.2rem; padding: 1px;", type: "color", value: cor, oninput: e => cor.val = e.target.value })
         ),
         div({ class: "d-flex justify-content-between", style: "width: 27rem; height: 4.8rem; margin-top: 10rem;" },
           button({ class: "btn btn-pedido btn-danger bg-danger border-0 p-0 rounded-0 text-center text-white", onclick: enviarParada }, "PARAR"),
           button({ class: "btn btn-pedido bg-accent border-0 rounded-0 p-0 text-center text-white", type: "submit" }, "ENVIAR")
         )
       )
     )
     
     const ContainerPrincipal = () => div({ class: "m-0 p-0 d-flex flex-column justify-content-center align-items-center min-vh-100", style: "background-color: lightgray;" },
       header("SAIP"),
       div({ class: "d-flex justify-content-between", style: "width: calc((30rem * 2) + 7.2rem)", onclick: () => { telaPedidoRef = TelaPedidos; van.add(document.body, TelaPedidos); }},
         button({ class: "btn btn-inicial bg-accent rounded-0 border-0 text-center text-white", style: "margin-right: 7.2rem;" }, "PADRÕES CUSTOMIZADOS"),
         button({ class: "btn btn-inicial bg-accent rounded-0 border-0 text-center text-white" }, "GERIR PEDIDOS")
     )
   )

     van.add(document.body, ContainerPrincipal());
    </script>
  </body>
</html>
